<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoStamp — geotag your photos for Local SEO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      color: #16212B; background: #FAF7F0;
      -webkit-font-smoothing: antialiased;
    }
    input, button, textarea { font-family: inherit; }
    ::selection { background: rgba(255,90,60,0.22); }
    @keyframes pinDrop { 0% { transform: translate(-50%, -130%) scale(0.6); opacity: 0; } 60% { transform: translate(-50%, -92%) scale(1.05); opacity: 1; } 100% { transform: translate(-50%, -100%) scale(1); opacity: 1; } }
    @keyframes pinPulse { 0% { box-shadow: 0 0 0 0 rgba(255,90,60,0.45); } 70% { box-shadow: 0 0 0 16px rgba(255,90,60,0); } 100% { box-shadow: 0 0 0 0 rgba(255,90,60,0); } }
    @keyframes toastIn { from { transform: translate(-50%, 14px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #E3DCCD; border-radius: 999px; border: 3px solid #FAF7F0; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
